<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin - मिशन कंट्रोल</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 p-4 min-h-screen font-sans">

    <div class="max-w-xl mx-auto space-y-6">
        
        <!-- Section 1: Fund & Notice -->
        <div class="bg-white rounded-[40px] p-8 shadow-xl border-4 border-orange-500">
            <h2 class="text-2xl font-black text-orange-600 mb-6 uppercase italic">Mission Dashboard ⚙️</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">कुल एकत्रित फंड (₹)</label>
                    <input id="fundVal" type="number" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-black text-xl text-orange-600">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">महत्वपूर्ण सूचना</label>
                    <textarea id="noticeIn" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm" rows="2"></textarea>
                </div>
                <div class="flex items-center justify-between p-4 bg-orange-50 rounded-2xl">
                    <span class="text-xs font-black text-orange-700 uppercase">Live on Home?</span>
                    <input id="noticeStatus" type="checkbox" class="w-6 h-6 accent-orange-500">
                </div>
                <button onclick="updateMaster()" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-orange-600 uppercase tracking-widest transition-all">Update Stats & Notice</button>
            </div>
        </div>

        <!-- Section 2: Add New History (Donation Proof) -->
        <div class="bg-white rounded-[40px] p-8 shadow-xl border-4 border-green-500">
            <h2 class="text-2xl font-black text-green-600 mb-6 uppercase italic">Add History Record 📜</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input id="hAmount" type="number" placeholder="राशि (₹)" class="bg-gray-50 p-4 rounded-2xl font-bold outline-none">
                    <input id="hDate" type="text" placeholder="तारीख (जैसे: 22 मार्च)" class="bg-gray-50 p-4 rounded-2xl font-bold outline-none">
                </div>
                <input id="hReason" type="text" placeholder="किसकी मदद हुई? (e.g. 5 अनाथ बच्चों को राशन)" class="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none">
                <input id="hYT" type="text" placeholder="YouTube वीडियो लिंक (Optional)" class="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none">
                <button onclick="addHistory()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-green-700 uppercase tracking-widest">Add History Entry</button>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCatl9XQlXXxAedYUxhuuhGvlPCQRHPSZU",
            authDomain: "help-e3df0.firebaseapp.com",
            databaseURL: "https://help-e3df0-default-rtdb.firebaseio.com",
            projectId: "help-e3df0",
            storageBucket: "help-e3df0.firebasestorage.app",
            messagingSenderId: "946692527261",
            appId: "1:946692527261:web:a9d92261d0b589bb587074"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Pin Check
        const pin = prompt("Admin PIN:");
        if(pin !== "1234") { document.body.innerHTML = "Access Denied"; }

        // Fetch Data
        db.ref('stats').on('value', s => {
            const d = s.val() || {};
            document.getElementById('fundVal').value = d.total || 0;
            document.getElementById('noticeIn').value = d.notice_text || "";
            document.getElementById('noticeStatus').checked = d.notice_visible || false;
        });

        function updateMaster() {
            db.ref('stats').update({
                total: parseFloat(document.getElementById('fundVal').value),
                notice_text: document.getElementById('noticeIn').value,
                notice_visible: document.getElementById('noticeStatus').checked
            }).then(() => alert("Dashboard Updated!"));
        }

        function addHistory() {
            const amount = document.getElementById('hAmount').value;
            const date = document.getElementById('hDate').value;
            const reason = document.getElementById('hReason').value;
            const yt = document.getElementById('hYT').value;

            if(!amount || !date || !reason) return alert("सारी जानकारी भरें!");

            db.ref('history').push({
                amount: amount, date: date, reason: reason, yt_link: yt
            }).then(() => {
                alert("History Added!");
                document.getElementById('hAmount').value = '';
                document.getElementById('hReason').value = '';
                document.getElementById('hYT').value = '';
            });
        }
    </script>
</body>
</html>
