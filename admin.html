<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>एडमिन - मिशन हेल्प</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">

    <div class="max-w-3xl mx-auto space-y-6 pb-20">
        <h1 class="text-3xl font-black italic text-gray-800">Admin Mission Control ⚙️</h1>

        <!-- Withdrawals Approval Section -->
        <div class="bg-white rounded-[40px] p-8 shadow-xl border-4 border-blue-600">
            <h2 class="text-xl font-black text-blue-600 mb-6 uppercase italic">Pending Withdrawals 💸</h2>
            <div id="pendingList" class="space-y-4">
                <p class="text-gray-400">कोई नया अनुरोध नहीं है।</p>
            </div>
        </div>

        <!-- Dashboard Stats -->
        <div class="bg-white rounded-[40px] p-8 shadow-xl border-4 border-orange-500">
            <h2 class="text-xl font-black text-orange-600 mb-6 uppercase italic">Mission Stats 📊</h2>
            <input id="fundVal" type="number" placeholder="Total Fund ₹" class="w-full bg-gray-50 p-4 rounded-2xl mb-4 font-black text-xl">
            <button onclick="updateFund()" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg">Update Charity Fund</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* आपकी कॉन्फ़िग यहाँ */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Security
        const pin = prompt("Admin PIN:");
        if(pin !== "1234") document.body.innerHTML = "Unauthorized";

        // Load Pending Withdrawals
        db.ref('withdrawals').on('value', s => {
            const list = document.getElementById('pendingList');
            list.innerHTML = '';
            s.forEach(child => {
                const w = child.val();
                if(w.status === 'pending'){
                    list.innerHTML += `
                        <div class="bg-gray-50 p-6 rounded-[30px] border border-gray-200 flex flex-col md:flex-row justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-gray-400 uppercase">User: ${w.userName}</p>
                                <p class="text-lg font-black text-gray-800">₹ ${w.amount}</p>
                                <p class="text-xs text-blue-600 font-bold">UPI: ${w.upi}</p>
                            </div>
                            <div class="mt-4 md:mt-0 flex space-x-2">
                                <button onclick="approveWithdraw('${child.key}')" class="bg-green-600 text-white px-6 py-2 rounded-xl font-black text-xs uppercase">Approve (Paid)</button>
                                <button onclick="rejectWithdraw('${child.key}', '${w.uid}', ${w.pointsDeducted})" class="bg-red-600 text-white px-6 py-2 rounded-xl font-black text-xs uppercase">Reject</button>
                            </div>
                        </div>`;
                }
            });
        });

        function approveWithdraw(id) {
            if(confirm("क्या आपने पैसे भेज दिए हैं?")) {
                db.ref('withdrawals/' + id).update({ status: 'approved' }).then(() => alert("Approved!"));
            }
        }

        function rejectWithdraw(id, uid, pts) {
            if(confirm("अनुरोध रिजेक्ट करें और पॉइंट्स वापस भेजें?")) {
                db.ref('withdrawals/' + id).remove().then(() => {
                    db.ref('users/' + uid + '/points').transaction(p => (p || 0) + pts);
                    alert("Rejected & Points Refunded!");
                });
            }
        }

        function updateFund() {
            db.ref('stats').update({ total: document.getElementById('fundVal').value });
            alert("Fund Updated!");
        }
    </script>
</body>
</html>
