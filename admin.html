<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 p-5 flex items-center justify-center min-h-screen font-sans">

    <div id="adminUI" class="bg-white rounded-[40px] p-10 w-full max-w-md shadow-2xl">
        <h1 class="text-3xl font-black text-center mb-8 text-gray-800 italic">ADMIN PANEL ⚙️</h1>
        
        <div class="space-y-6">
            <!-- Fund Update -->
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">कुल एकत्रित फंड (₹)</label>
                <input id="fundVal" type="number" placeholder="जैसे: 5000" class="w-full bg-gray-100 p-4 rounded-2xl border-none outline-none focus:ring-2 ring-orange-400 font-black text-xl text-orange-600">
            </div>

            <hr>

            <!-- Notice Board -->
            <div class="space-y-3">
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">महत्वपूर्ण सूचना (Mahatvpurn Suchna)</label>
                <textarea id="noticeTextIn" placeholder="यहाँ सूचना लिखें..." class="w-full bg-gray-100 p-4 rounded-2xl outline-none font-bold text-sm" rows="3"></textarea>
                
                <div class="flex items-center justify-between p-4 bg-orange-50 rounded-2xl">
                    <span class="text-xs font-bold text-orange-700">होम पेज पर दिखाएं?</span>
                    <input id="noticeToggle" type="checkbox" class="w-6 h-6 accent-orange-500">
                </div>
            </div>

            <button onclick="updateMaster()" class="w-full bg-orange-500 text-white font-black py-5 rounded-[25px] shadow-xl hover:bg-orange-600 active:scale-95 transition-all uppercase tracking-widest">डेटा अपडेट करें</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCatl9XQlXXxAedYUxhuuhGvlPCQRHPSZU",
            authDomain: "help-e3df0.firebaseapp.com",
            databaseURL: "https://help-e3df0-default-rtdb.firebaseio.com",
            projectId: "help-e3df0",
            storageBucket: "help-e3df0.firebasestorage.app",
            messagingSenderId: "946692527261",
            appId: "1:946692527261:web:a9d92261d0b589bb587074"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Simple Security
        const pin = prompt("Admin PIN:");
        if(pin !== "1234") { document.body.innerHTML = "Access Denied"; }

        // Fetch Current Stats
        db.ref('stats').once('value', s => {
            const d = s.val() || {};
            document.getElementById('fundVal').value = d.total || 0;
            document.getElementById('noticeTextIn').value = d.notice_text || "";
            document.getElementById('noticeToggle').checked = d.notice_visible || false;
        });

        function updateMaster() {
            db.ref('stats').update({
                total: parseFloat(document.getElementById('fundVal').value),
                notice_text: document.getElementById('noticeTextIn').value,
                notice_visible: document.getElementById('noticeToggle').checked
            }).then(() => alert("वेबसाइट अपडेट हो गई है! ❤️"));
        }
    </script>
</body>
</html>
