<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>एडमिन कंट्रोल - मिशन हेल्प</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 p-4 min-h-screen text-gray-800 font-sans">

    <div id="loginSection" class="fixed inset-0 bg-gray-900 flex items-center justify-center p-6 z-[1000]">
        <div class="bg-white p-10 rounded-[50px] w-full max-w-sm text-center shadow-2xl border-t-8 border-orange-500">
            <h1 class="text-3xl font-black mb-8 italic">ADMIN LOGIN</h1>
            <input id="pinIn" type="password" placeholder="प्रवेश पिन डालें" class="w-full bg-gray-100 p-5 rounded-3xl mb-6 text-center font-bold outline-none focus:ring-4 ring-orange-200">
            <button onclick="loginAdmin()" class="w-full bg-orange-500 text-white font-black py-5 rounded-3xl shadow-xl hover:scale-105 transition-all">UNLOCK</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto space-y-8 py-8">
        <!-- Dashboard Card -->
        <div class="bg-white rounded-[50px] p-10 shadow-2xl border-b-8 border-orange-500">
            <h2 class="text-2xl font-black mb-8 italic text-orange-600 flex items-center">📊 डैशबोर्ड कंट्रोल</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">कुल एकत्रित फंड (₹)</label>
                    <input id="fundVal" type="number" class="w-full bg-gray-50 p-5 rounded-3xl font-black text-2xl text-orange-600 outline-none border focus:border-orange-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">महत्वपूर्ण सूचना</label>
                    <textarea id="noticeIn" class="w-full bg-gray-50 p-5 rounded-3xl font-bold text-sm outline-none border focus:border-orange-500" rows="2"></textarea>
                </div>
                <div class="flex items-center justify-between p-5 bg-orange-50 rounded-3xl">
                    <span class="text-xs font-black text-orange-700 uppercase">वेबसाइट पर दिखाएँ?</span>
                    <input id="noticeToggle" type="checkbox" class="w-8 h-8 accent-orange-500">
                </div>
                <button onclick="updateStats()" class="w-full bg-orange-500 text-white font-black py-5 rounded-3xl shadow-xl hover:bg-orange-600">अपडेट करें</button>
            </div>
        </div>

        <!-- History Card -->
        <div class="bg-white rounded-[50px] p-10 shadow-2xl border-b-8 border-green-600">
            <h2 class="text-2xl font-black mb-8 italic text-green-600 flex items-center">📜 मदद का रिकॉर्ड जोड़ें</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input id="hAmt" type="number" placeholder="राशि ₹" class="bg-gray-50 p-5 rounded-3xl font-bold outline-none border focus:border-green-500">
                    <input id="hDate" type="text" placeholder="तारीख (21 Mar)" class="bg-gray-50 p-5 rounded-3xl font-bold outline-none border focus:border-green-500">
                </div>
                <input id="hReason" type="text" placeholder="मदद का कारण (उदा: 10 बच्चों को भोजन)" class="w-full bg-gray-50 p-5 rounded-3xl font-bold outline-none border focus:border-green-500">
                <input id="hYT" type="text" placeholder="YouTube लिंक (सबूत के लिए)" class="w-full bg-gray-50 p-5 rounded-3xl font-bold outline-none border focus:border-green-500">
                <button onclick="addHistory()" class="w-full bg-green-600 text-white font-black py-5 rounded-3xl shadow-xl hover:bg-green-700">रिकॉर्ड सेव करें</button>
            </div>
        </div>

        <!-- Settings Card -->
        <div class="bg-white rounded-[50px] p-10 shadow-2xl border-b-8 border-gray-800">
            <h2 class="text-2xl font-black mb-8 italic text-gray-800 flex items-center">⚙️ सुरक्षा सेटिंग</h2>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">नया एडमिन पिन</label>
                <input id="newPin" type="text" placeholder="नया पासवर्ड" class="w-full bg-gray-50 p-5 rounded-3xl font-bold outline-none border focus:border-gray-800 mt-1">
                <button onclick="changePin()" class="w-full bg-gray-900 text-white font-black py-4 rounded-3xl mt-6">पिन बदलें</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCatl9XQlXXxAedYUxhuuhGvlPCQRHPSZU",
            authDomain: "help-e3df0.firebaseapp.com",
            databaseURL: "https://help-e3df0-default-rtdb.firebaseio.com",
            projectId: "help-e3df0",
            storageBucket: "help-e3df0.firebasestorage.app",
            messagingSenderId: "946692527261",
            appId: "1:946692527261:web:a9d92261d0b589bb587074"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentPass = "1234";
        db.ref('admin/pass').on('value', s => { if(s.val()) currentPass = s.val(); });

        function loginAdmin() {
            if(document.getElementById('pinIn').value === currentPass) {
                document.getElementById('loginSection').classList.add('hidden');
            } else alert("गलत पिन!");
        }

        function changePin() {
            const np = document.getElementById('newPin').value;
            if(np.length < 4) return alert("पिन कम से कम 4 अक्षर का हो!");
            db.ref('admin').update({ pass: np }).then(() => alert("पिन बदल गया!"));
        }

        db.ref('stats').on('value', s => {
            const d = s.val() || {};
            document.getElementById('fundVal').value = d.total || 0;
            document.getElementById('noticeIn').value = d.notice_text || "";
            document.getElementById('noticeToggle').checked = d.notice_visible || false;
        });

        function updateStats() {
            db.ref('stats').update({
                total: parseFloat(document.getElementById('fundVal').value),
                notice_text: document.getElementById('noticeIn').value,
                notice_visible: document.getElementById('noticeToggle').checked
            }).then(() => alert("अपडेट सफल! ❤️"));
        }

        function addHistory() {
            const amt = document.getElementById('hAmt').value;
            const dt = document.getElementById('hDate').value;
            const res = document.getElementById('hReason').value;
            const yt = document.getElementById('hYT').value;
            if(!amt || !dt || !res) return alert("जानकारी अधूरी है!");

            db.ref('history').push({
                amount: amt, date: dt, reason: res, yt: yt
            }).then(() => {
                alert("रिकॉर्ड जुड़ गया!");
                document.getElementById('hAmt').value = '';
                document.getElementById('hReason').value = '';
            });
        }
    </script>
</body>
</html>
