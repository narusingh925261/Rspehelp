<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Mission Help</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 p-6 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-[50px] p-10 w-full max-w-md shadow-2xl">
        <h1 class="text-3xl font-black text-center mb-10 text-gray-800">Mission Control ⚙️</h1>
        
        <div class="space-y-6">
            <!-- Fund Update -->
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">कुल एकत्रित फंड (₹)</label>
                <input id="fundVal" type="number" class="w-full bg-gray-50 p-5 rounded-3xl outline-none focus:ring-2 ring-orange-500 font-black text-2xl text-orange-600 mt-1">
            </div>

            <hr class="opacity-50">

            <!-- Notice Update -->
            <div class="space-y-4">
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">महत्वपूर्ण सूचना (Notice)</label>
                <textarea id="noticeIn" class="w-full bg-gray-50 p-5 rounded-3xl outline-none font-bold text-sm" rows="3"></textarea>
                <div class="flex items-center justify-between px-4 py-2 bg-orange-50 rounded-2xl">
                    <span class="text-xs font-black text-orange-700">Live on Home Page?</span>
                    <input id="noticeStatus" type="checkbox" class="w-6 h-6 accent-orange-500">
                </div>
            </div>

            <button onclick="updateData()" class="w-full bg-orange-500 text-white font-black py-5 rounded-[30px] shadow-xl hover:bg-orange-600 uppercase tracking-widest transition-all">Update Mission Dashboard</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCatl9XQlXXxAedYUxhuuhGvlPCQRHPSZU",
            authDomain: "help-e3df0.firebaseapp.com",
            databaseURL: "https://help-e3df0-default-rtdb.firebaseio.com",
            projectId: "help-e3df0",
            storageBucket: "help-e3df0.firebasestorage.app",
            messagingSenderId: "946692527261",
            appId: "1:946692527261:web:a9d92261d0b589bb587074"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Basic Security
        const pin = prompt("Admin Security PIN:");
        if(pin !== "1234") { document.body.innerHTML = "<h1 style='text-align:center; margin-top:100px;'>Access Denied</h1>"; }

        // Fetch Stats
        db.ref('stats').once('value', s => {
            const d = s.val() || {};
            document.getElementById('fundVal').value = d.total || 0;
            document.getElementById('noticeIn').value = d.notice_text || "";
            document.getElementById('noticeStatus').checked = d.notice_visible || false;
        });

        function updateData() {
            db.ref('stats').update({
                total: parseFloat(document.getElementById('fundVal').value),
                notice_text: document.getElementById('noticeIn').value,
                notice_visible: document.getElementById('noticeStatus').checked
            }).then(() => alert("Mission Dashboard Updated Successfully! ❤️"));
        }
    </script>
</body>
</html>
